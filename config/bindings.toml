[bindings]
timer_source = []

# UART source bindings.
# source_key 是电控发来的命令，命中后由配置决定调用哪个 device + function。
[[bindings.uart_source]]
task_id = "uart_color_detect"
source_key = "a1"
device_id = "color_camera"
function_id = "color_detect"

[[bindings.uart_source]]
task_id = "uart_qr_detect"
source_key = "b2"
device_id = "qr_camera"
function_id = "qr_detect"

# Debug loop source.
# 启动后先发送一次 debug_fun，之后 LoopSource 每 5 秒发送一次 DebugEvent。
